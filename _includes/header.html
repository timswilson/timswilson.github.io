<header class="sticky top-0 z-20 backdrop-blur-md" style="background: var(--header-bg); border-bottom: 1px solid var(--border); transition: background 400ms ease, border-color 400ms ease">
  <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="w-8 h-8 rounded-full grid place-items-center text-[13px] font-semibold select-none" style="background: var(--mode-accent); color: var(--bg); transition: background 400ms ease, color 400ms ease">TW</div>
    <button id="dark-toggle" onclick="toggleDark()" aria-label="Toggle dark mode" class="w-9 h-9 rounded-full grid place-items-center" style="border: 1px solid var(--border); color: var(--muted); transition: border-color 400ms ease, color 400ms ease">
      <span id="icon-moon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      <span id="icon-sun" style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg></span>
    </button>
  </div>
</header>
